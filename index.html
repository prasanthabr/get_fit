<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>log</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">

    <header class="top-bar">
      <div id="person-switcher"></div>
      <div class="filters">
        <button data-range="7d">7d</button>
        <button data-range="30d">30d</button>
        <button data-range="90d">90d</button>
        <button data-range="all" class="active">all</button>
      </div>
    </header>

    <div id="stats" class="stats-grid"></div>

    <div id="progress-wrap" class="progress-wrap">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="motivation" class="motivation-text"></div>

    <div id="milestones" class="milestones-strip"></div>

    <section class="chart-section">
      <div class="section-header">⚖️ body</div>
      <div class="chart-row split-3-1">
        <div class="chart-box">
          <div class="chart-label">⚖️ weight</div>
          <div class="chart-container">
            <canvas id="weightChart"></canvas>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-label">📏 waist</div>
          <div class="chart-container chart-sm">
            <canvas id="waistChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-header">🥗 nutrition</div>
      <div class="chart-row split-2">
        <div class="chart-box">
          <div class="chart-label">🥩 protein</div>
          <div class="chart-container">
            <canvas id="proteinChart"></canvas>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-label">💧 water</div>
          <div class="chart-container">
            <canvas id="waterChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-header">🩺 clinical</div>
      <div class="chart-row split-2">
        <div class="chart-box">
          <div class="chart-label">❤️ blood pressure</div>
          <div class="chart-container">
            <canvas id="bpChart"></canvas>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-label">🫀 cholesterol</div>
          <div class="chart-container">
            <canvas id="cholChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section class="chart-section">
      <div class="section-header">⚡ activity</div>
      <div class="chart-row split-2">
        <div class="chart-box">
          <div class="chart-label">🏋️ training</div>
          <div class="chart-container">
            <canvas id="exerciseChart"></canvas>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-label">🦶 gout</div>
          <div class="chart-container">
            <canvas id="goutChart"></canvas>
          </div>
        </div>
      </div>
    </section>

  </div>

  <div id="loading" class="loading-overlay">
    <div class="loading-dot"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
